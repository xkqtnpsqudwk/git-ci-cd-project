name: git-ci-cd-project

services:
  web:
    image: plzbuffshen/git-ci-cd-project-web:latest
    build:
      context: .
      dockerfile: DockerFile
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_NAME: ${DB_NAME:-my_site}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports: 
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${DB_NAME:-my_site}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$${MYSQL_ROOT_PASSWORD} --socket=/var/run/mysqld/mysqld.sock"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
