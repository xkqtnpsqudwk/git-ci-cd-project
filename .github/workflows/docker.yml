name: Docker CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      DOCKER_IMAGE: plzbuffshen/git-ci-cd-project-web
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DB_HOST: db
      DB_NAME: my_site
      DB_USER: root
      DB_PASSWORD: ci_test_password
      MYSQL_ROOT_PASSWORD: ci_test_password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config

      - name: Build and start containers
        run: docker compose up --build -d

      - name: Show running containers
        run: docker compose ps

      - name: Verify web page
        run: |
          for i in {1..30}; do
            if curl --fail --silent --show-error http://localhost:8080/admin_users.php > /tmp/admin_users.html; then
              cat /tmp/admin_users.html
              exit 0
            fi

            docker compose logs --no-color --tail=30 web
            sleep 2
          done

          exit 1

      - name: Verify MySQL table
        run: docker compose exec -T db mysql -uroot "-p${MYSQL_ROOT_PASSWORD}" "${DB_NAME}" -e "SHOW TABLES; SELECT COUNT(*) AS member_count FROM member;"

      - name: Check Docker Hub secrets
        id: dockerhub
        run: |
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "push_image=true" >> "${GITHUB_OUTPUT}"
          else
            echo "Docker Hub secrets are not configured. Skipping image push."
            echo "push_image=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Login to Docker Hub
        if: steps.dockerhub.outputs.push_image == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker image
        if: steps.dockerhub.outputs.push_image == 'true'
        run: |
          docker tag "${DOCKER_IMAGE}:latest" "${DOCKER_IMAGE}:${GITHUB_SHA::7}"

      - name: Push Docker image
        if: steps.dockerhub.outputs.push_image == 'true'
        run: |
          docker push "${DOCKER_IMAGE}:latest"
          docker push "${DOCKER_IMAGE}:${GITHUB_SHA::7}"

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop containers
        if: always()
        run: docker compose down
